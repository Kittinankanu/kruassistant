<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบประเมินครูผู้ช่วย</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6B21A8;
            --primary-light: #E9D5FF;
            --primary-soft: #F5F0FA;
            --text: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }
        body {
            font-family: "Sarabun", sans-serif;
            min-height: 100vh;
            background: var(--primary-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px 40px 36px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 4px 24px rgba(107,33,168,0.08);
            max-width: 420px;
            width: 90%;
        }
        .logo-img { width: 100px; height: 100px; object-fit: contain; margin-bottom: 16px; }
        h1 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
        .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
        .btn {
            display: block; width: 100%; padding: 14px 20px;
            border-radius: 10px; border: none; font-size: 15px;
            font-family: "Sarabun", sans-serif; font-weight: 500;
            cursor: pointer; transition: all 0.15s ease;
            text-decoration: none; text-align: center;
        }
        .btn:active { transform: scale(0.98); }
        .btn-committee { background: var(--primary); color: white; margin-bottom: 20px; display: block; }
        .btn-committee:hover { background: #581C87; }
        .btn-small {
            background: none; border: none; color: var(--text-muted);
            font-size: 13px; font-family: "Sarabun", sans-serif;
            cursor: pointer; text-decoration: underline; padding: 4px 0;
        }
        .btn-small:hover { color: var(--primary); }
        .card-footer { text-align: left; }
    </style>
</head>

        <h1>ระบบประเมินครูผู้ช่วย</h1>
        <p class="subtitle">ระบบติดตามการเตรียมความพร้อมและพัฒนาอย่างเข้ม</p>
        <a href="dashboard.html" class="btn btn-committee">📄 เข้าสู่หน้าการประเมิน</a>
        <div class="card-footer">
            <button class="btn-small" onclick="teacherLogin()">สำหรับครูผู้ช่วย</button>
        </div>
    </div>
    <script>
    const API = "https://script.google.com/macros/s/AKfycbz5CsXD1vW2KQX2Fi-imRxb2nlXiwGKZbRIx7zduIbtioWbO7x7ASd_A1iF0r5e4e-4/exec";
    function teacherLogin() {
        const pw = prompt("กรุณาใส่รหัสผ่านค่ะ");
        if (pw === null) return;
        fetch(API + "?action=login&password=" + encodeURIComponent(pw))
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                sessionStorage.setItem("isTeacher", "true");
                window.location.href = "dashboard.html";
            } else {
                alert("รหัสผ่านไม่ถูกต้องค่ะ");
            }
        })
        .catch(() => alert("เกิดข้อผิดพลาด กรุณาลองใหม่ค่ะ"));
    }
    </script>
