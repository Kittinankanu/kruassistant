<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>แดชบอร์ด - นายกิตตินันท์ น้อยอ่ำ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#6B21A8;--primary-light:#E9D5FF;--primary-soft:#F5F0FA;--text:#1F2937;--muted:#6B7280;--border:#E5E7EB}
body{font-family:"Sarabun",sans-serif;background:var(--primary-soft);color:var(--text);min-height:100vh}
.wrap{max-width:920px;margin:0 auto;padding:28px 20px}
.hero{background:var(--primary);border-radius:20px;margin-bottom:24px;position:relative;display:flex;align-items:center;gap:20px;padding:24px;min-height:160px}
.avatar-img-wrap{width:110px;height:130px;border-radius:14px;border:3px solid rgba(255,255,255,0.4);overflow:hidden;flex-shrink:0}
.avatar-img-wrap img{width:100%;height:100%;object-fit:cover}
.hero-info{flex:1;padding-right:90px}
.hero-name{font-size:24px;font-weight:700;color:#fff;margin-bottom:6px}
.hero-sub{font-size:15px;color:#D8B4FE;margin-bottom:18px;line-height:1.7}
.htags-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.htag{font-size:14px;padding:5px 13px;border-radius:20px;background:rgba(255,255,255,0.12);color:#EDE9FE;border:1px solid rgba(255,255,255,0.2)}
.logo-wrap{position:absolute;top:14px;right:14px}
.logo-box{width:64px;height:64px;border-radius:10px;overflow:hidden}
.logo-box img{width:100%;height:100%;object-fit:contain}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:white;border-radius:14px;border:1px solid var(--primary-light);padding:18px;text-align:center}
.stat-num{font-size:30px;font-weight:700;color:var(--primary)}
.stat-label{font-size:14px;color:#9CA3AF;margin-top:3px}
.section-label{font-size:13px;font-weight:600;color:#9CA3AF;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px}
.rounds{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.rcard{background:white;border-radius:16px;border:1px solid var(--border);padding:22px;display:flex;flex-direction:column;transition:all 0.15s}
.rcard:hover{border-color:#C4B5FD;box-shadow:0 6px 24px -8px rgba(107,33,168,0.2)}
.rcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.round-pill{font-size:13px;font-weight:600;padding:5px 13px;border-radius:20px;background:var(--primary-soft);color:var(--primary);border:1px solid var(--primary-light)}
.badge{font-size:13px;padding:5px 11px;border-radius:20px;font-weight:500}
.badge-pass{background:#ECFDF5;color:#047857;border:1px solid #A7F3D0}
.badge-ready{background:#FFFBEB;color:#B45309;border:1px solid #FDE68A}
.badge-future{background:#F3F4F6;color:#6B7280;border:1px solid #E5E7EB}
.rcard-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px}
.rcard-date{font-size:14px;color:#9CA3AF;margin-bottom:18px}
.domains{display:flex;flex-direction:column;gap:13px;margin-bottom:18px;flex:1}
.domain-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.domain-name{font-size:14px;color:#4B5563;font-weight:500}
.domain-count{font-size:13px;color:#9CA3AF}
.track-wrap{position:relative;height:7px;background:#F3E8FF;border-radius:99px;overflow:hidden}
.track-fill{height:100%;background:var(--primary);border-radius:99px;transition:width 0.5s ease}
.threshold-line{position:absolute;top:0;width:2px;height:100%;background:#EF4444;z-index:2}
.btn-enter{display:block;width:100%;padding:13px;border-radius:10px;background:var(--primary);color:white;font-size:15px;font-weight:600;font-family:"Sarabun",sans-serif;border:none;cursor:pointer;text-align:center;text-decoration:none;transition:background 0.15s}
.btn-enter:hover{background:#581C87}
.btn-ghost{display:block;width:100%;padding:13px;border-radius:10px;background:white;color:#9CA3AF;font-size:15px;font-weight:600;font-family:"Sarabun",sans-serif;border:1px solid var(--border);cursor:not-allowed;text-align:center}
.loading{text-align:center;padding:40px;color:#9CA3AF;font-size:15px}
</style>
</head>

    {name:"ด้านวิชาชีพ",total:15,threshold:11,pct:73.3},
    {name:"ด้านสังคม",total:3,threshold:3,pct:100},
    {name:"ด้านคุณลักษณะ",total:16,threshold:11,pct:68.7}
  ]}
];

function getBadge(s){
  if(s==="ผ่าน") return "<span class=\"badge badge-pass\">ผ่าน</span>";
  if(s==="พร้อมประเมิน") return "<span class=\"badge badge-ready\">พร้อมประเมิน</span>";
  return "<span class=\"badge badge-future\">ยังไม่ถึง</span>";
}

function getBtn(s,file,id){
  if(s==="พร้อมประเมิน") return "<a class=\"btn-enter\" href=\""+file+"\">เข้าสู่หน้าประเมินครั้งที่ "+id+"</a>";
  if(s==="ผ่าน") return "<a class=\"btn-enter\" href=\""+file+"\">ดูผลการประเมินครั้งที่ "+id+"</a>";
  return "<span class=\"btn-ghost\">ยังไม่ถึงรอบประเมิน</span>";
}

async function loadDashboard(){
  try{
    const [config,...checkData] = await Promise.all([
      fetch(API+"?action=getConfig").then(r=>r.json()),
      fetch(API+"?action=getChecklist&round=1").then(r=>r.json()),
      fetch(API+"?action=getChecklist&round=2").then(r=>r.json()),
      fetch(API+"?action=getChecklist&round=3").then(r=>r.json()),
      fetch(API+"?action=getChecklist&round=4").then(r=>r.json())
    ]);

    const statuses = [config.round1_status,config.round2_status,config.round3_status,config.round4_status];
    let pass=0,ready=0,waiting=0;
    statuses.forEach(s=>{
      if(s==="ผ่าน") pass++;
      else if(s==="พร้อมประเมิน") ready++;
      else waiting++;
    });
    document.getElementById("statPass").textContent=pass;
    document.getElementById("statReady").textContent=ready;
    document.getElementById("statWaiting").textContent=waiting;

    document.getElementById("roundsGrid").innerHTML = ROUNDS.map((r,i)=>{
      const checks = checkData[i]||{};
      const totalChecked = Object.values(checks).filter(v=>v===true).length;
      const status = statuses[i]||"ยังไม่ถึง";
      const domains = r.domains.map(d=>{
        const filled = Math.round((totalChecked/r.domains.reduce((a,x)=>a+x.total,0))*100);
        return "<div><div class=\"domain-header\"><span class=\"domain-name\">"+d.name+"</span><span class=\"domain-count\">"+totalChecked+" / "+d.total+" รายการ</span></div><div class=\"track-wrap\"><div class=\"track-fill\" style=\"width:"+Math.min(filled,100)+"%\"></div><div class=\"threshold-line\" style=\"left:"+d.pct+"%\"></div></div></div>";
      }).join("");
      return "<div class=\"rcard\"><div class=\"rcard-top\"><span class=\"round-pill\">ครั้งที่ "+r.id+"</span>"+getBadge(status)+"</div><div class=\"rcard-title\">การประเมินครั้งที่ "+r.id+"</div><div class=\"rcard-date\">"+r.date+"</div><div class=\"domains\">"+domains+"</div>"+getBtn(status,r.file,r.id)+"</div>";
    }).join("");
  } catch(e){
    document.getElementById("roundsGrid").innerHTML="<div class=\"loading\">ไม่สามารถโหลดข้อมูลได้ค่ะ</div>";
  }
}

loadDashboard();
setInterval(loadDashboard, 15000);
</script>
</body></html>
